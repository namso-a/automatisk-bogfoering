<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvitly · Siden findes ikke</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1612; --paper: #fafaf7; --accent: #9a6f28; --muted: #8a817a; --warm: #e8e4d8; --radius: 6px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .card { max-width: 460px; text-align: center; }
        .code { font-family: 'Fraunces', serif; font-size: 4.5rem; font-weight: 300; color: var(--accent); letter-spacing: -0.02em; line-height: 1; margin-bottom: 0.6rem; }
        h1 { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.6rem; }
        p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.6rem; }
        a.btn { display: inline-block; padding: 0.85rem 1.5rem; color: var(--paper); background: var(--ink); border-radius: var(--radius); text-decoration: none; font-weight: 500; transition: background 0.2s; }
        a.btn:hover { background: var(--accent); }
        .helper { margin-top: 1.4rem; font-size: 0.85rem; color: var(--muted); }
        .helper a { color: var(--accent); text-decoration: none; }
        .helper a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <h1>Siden findes ikke</h1>
        <p>Linket er enten skrevet forkert eller ikke længere aktivt.<br>Prøv tilbage til forsiden.</p>
        <a href="{{ url_for('index') }}" class="btn">← Tilbage til Kvitly</a>
        <p class="helper">Hvis du fulgte et upload-link fra din forening og det ikke virker længere, skriv til <a href="mailto:othman@ajjalytics.dev">othman@ajjalytics.dev</a>.</p>
    </div>
</body>
</html>
