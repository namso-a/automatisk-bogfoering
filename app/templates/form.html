<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M7 3 L25 3 L25 25 L23 27 L21 25 L19 27 L17 25 L15 27 L13 25 L11 27 L9 25 L7 27 Z' fill='%231a1612'/><rect x='10' y='8' width='12' height='1.8' fill='%23fafaf7'/><rect x='10' y='12' width='8' height='1.8' fill='%23fafaf7'/><rect x='10' y='16' width='12' height='1.8' fill='%23fafaf7'/><rect x='10' y='20' width='12' height='2.6' fill='%239a6f28'/></svg>">
    <title>Kvitly · Indsend kvittering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1612;
            --paper: #fafaf7;
            --warm: #e8e4d8;
            --warm-dark: #d6d0c0;
            --accent: #9a6f28;
            --accent-hover: #7d5a20;
            --muted: #8a817a;
            --success-bg: #e6f2e6;
            --success-ink: #2d5a2d;
            --radius: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 1.25rem 1.25rem 6rem;
            padding-bottom: calc(6rem + env(safe-area-inset-bottom, 0px));
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--warm);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
        }
        .brand-mark {
            width: 20px;
            height: 25px;
            flex-shrink: 0;
        }
        .brand-name {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .header p {
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* Form */
        .field {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        select, input[type="text"], input[type="tel"], input[type="email"], textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--ink);
            background: #fff;
            border: 1.5px solid var(--warm);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        textarea {
            resize: vertical;
            min-height: 3.5rem;
            max-height: 8rem;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(154, 111, 40, 0.12);
        }

        /* Email validation feedback — only show invalid styling after user
           has interacted with the field, never on a pristine empty field */
        input[type="email"]:not(:placeholder-shown):not(:focus):invalid {
            border-color: #c0392b;
            box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.10);
        }
        input[type="email"]:not(:placeholder-shown):not(:focus):invalid + small.email-hint {
            color: #c0392b;
        }

        /* Radio group — pill buttons */
        .radio-group {
            display: flex;
            gap: 0.5rem;
        }

        .radio-option {
            flex: 1;
            display: block;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .radio-option span {
            display: block;
            text-align: center;
            padding: 0.75rem 0.5rem;
            border: 1.5px solid var(--warm);
            border-radius: var(--radius);
            background: #fff;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
            color: var(--ink);
        }

        .radio-option input[type="radio"]:checked + span {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .radio-option span:hover {
            border-color: var(--accent);
        }

        /* Conditional refund fields */
        .refund-fields {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.35s ease, opacity 0.25s ease, margin 0.35s ease;
            margin-top: 0;
        }

        .refund-fields.visible {
            max-height: 300px;
            opacity: 1;
            margin-top: 1.5rem;
        }

        .refund-fields .field:last-child {
            margin-bottom: 0;
        }

        .refund-row {
            display: flex;
            gap: 0.75rem;
        }

        .refund-row .field:first-child {
            flex: 0 0 35%;
        }

        .refund-row .field:last-child {
            flex: 1;
        }

        /* Upload area */
        .upload-area {
            position: relative;
            border: 2px dashed var(--warm);
            border-radius: var(--radius);
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fff;
        }

        /* Hover-affordance kun mens boksen er tom. Når filer er tilføjet
           får hele kontaineren ellers et hover-highlight som får brugeren
           til at tro de kan klikke overalt for at fjerne/tilføje. */
        .upload-area:not(.has-files):hover,
        .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(196, 93, 62, 0.03);
        }

        .upload-area.has-files {
            border-style: solid;
            border-color: var(--accent);
            padding: 0.75rem 1rem;
            cursor: default;
        }

        .upload-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 0.75rem;
            opacity: 0.35;
        }

        .upload-text {
            font-size: 0.95rem;
            color: var(--muted);
        }

        .upload-text strong {
            color: var(--accent);
            font-weight: 500;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* When files are picked, the file-list takes over the upload-area's
           interior. The absolutely-positioned <input> would otherwise overlay
           the thumbnails (and their X-buttons), making any click — including
           on the remove button — re-open the file picker. Disable hit-testing
           on the overlay input in that state; the camera/gallery/add-more
           buttons still fire fileInput.click() programmatically. */
        .upload-area.has-files input[type="file"] {
            pointer-events: none;
        }

        /* File list (multi-upload) */
        .file-list {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }

        .file-list.visible { display: flex; }

        .file-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(196, 93, 62, 0.04);
            border-radius: 8px;
            padding: 0.4rem 0.5rem;
        }

        .file-thumb {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .file-icon {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            background: var(--warm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .file-remove {
            background: rgba(196, 93, 62, 0.08);
            border: none;
            color: var(--accent);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.05rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }

        .file-remove:hover,
        .file-remove:focus-visible {
            background: var(--accent);
            color: #fff;
            outline: none;
        }

        .upload-placeholder { display: block; }
        .has-files .upload-placeholder { display: none; }

        .add-more {
            display: none;
            margin-top: 0.75rem;
            padding: 0.55rem 1rem;
            font-size: 0.85rem;
            color: var(--accent);
            background: rgba(196, 93, 62, 0.06);
            border: 1px solid rgba(196, 93, 62, 0.25);
            border-radius: 999px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s;
        }

        .add-more:hover,
        .add-more:focus-visible {
            background: rgba(196, 93, 62, 0.12);
            border-color: var(--accent);
            outline: none;
        }

        .has-files .add-more { display: inline-block; }

        /* Sticky submit bar */
        .submit-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--paper);
            padding: 0.75rem 1.25rem;
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--warm);
            z-index: 100;
        }

        .submit-bar-inner {
            max-width: 440px;
            margin: 0 auto;
        }

        /* Submit */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .submit-btn__label {
            position: relative;
            z-index: 1;
        }

        .submit-btn:hover { background: var(--accent-hover); }
        .submit-btn:active { transform: scale(0.985); }

        .submit-btn:disabled {
            background: var(--warm);
            color: var(--muted);
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner-mode loading (used by confirm-btn) */
        .submit-btn.loading {
            color: transparent;
        }

        .submit-btn.loading::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            margin: -10px 0 0 -10px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            z-index: 2;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scanning-mode loading: knappen ER progress-bar'en (submit-btn during OCR) */
        .submit-btn.loading.scanning {
            color: #fff;
            background: rgba(196, 93, 62, 0.18);
            cursor: progress;
        }
        .submit-btn.loading.scanning:disabled {
            color: #fff;
            background: rgba(196, 93, 62, 0.18);
        }
        .submit-btn.loading.scanning::after {
            display: none;   /* skjul spinneren — fill-en er nu eneste indikator */
        }
        .submit-btn.loading.scanning::before {
            content: "";
            position: absolute;
            inset: 0;
            width: var(--scan-pct, 0%);
            background: linear-gradient(90deg, var(--accent) 0%, #b88a3e 50%, var(--accent) 100%);
            background-size: 200% 100%;
            animation: scan-shimmer 1.8s linear infinite;
            transition: width 0.22s ease-out;
            z-index: 0;
        }

        .progress-text {
            display: none;
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 0.75rem;
        }

        .progress-text.visible { display: block; }

        @keyframes scan-shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }

        /* Success message */
        .success {
            display: none;
            text-align: center;
            padding: 2rem 1rem;
            background: var(--success-bg);
            border-radius: var(--radius);
            margin-top: 1rem;
        }

        .success.visible { display: block; }

        .success-check {
            width: 48px;
            height: 48px;
            margin: 0 auto 1rem;
            background: var(--success-ink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success h2 {
            font-family: 'Fraunces', serif;
            font-weight: 400;
            font-size: 1.35rem;
            color: var(--success-ink);
            margin-bottom: 0.35rem;
        }

        .success p {
            color: var(--success-ink);
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .success .again-btn {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 0.6rem 1.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--success-ink);
            background: transparent;
            border: 1.5px solid var(--success-ink);
            border-radius: var(--radius);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .again-btn:hover {
            background: rgba(45, 90, 45, 0.08);
        }

        /* Error */
        .error-msg {
            display: none;
            padding: 0.75rem 1rem;
            background: #fce8e8;
            color: #8b2020;
            border-radius: var(--radius);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .error-msg.visible { display: block; }

        /* OCR result summary */
        .ocr-results {
            margin-top: 1rem;
            text-align: left;
        }

        .ocr-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(45, 90, 45, 0.15);
            font-size: 0.85rem;
        }

        .ocr-item:last-child { border-bottom: none; }

        .ocr-label {
            color: var(--success-ink);
            opacity: 0.7;
        }

        .ocr-value {
            font-weight: 500;
            color: var(--success-ink);
        }

        /* Camera-first upload buttons */
        .upload-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .upload-btn-camera, .upload-btn-gallery {
            flex: 1;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.9rem 0.75rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: var(--radius);
            cursor: pointer;
            border: none;
        }

        .upload-btn-camera {
            background: var(--accent);
            color: #fff;
        }

        .upload-btn-camera:hover { background: var(--accent-hover); }

        .upload-btn-gallery {
            background: #fff;
            color: var(--ink);
            border: 1.5px solid var(--warm);
        }

        .upload-btn-gallery:hover { border-color: var(--accent); }

        .has-files .upload-buttons { display: none; }
        .has-files .upload-placeholder { display: none; }

        /* Duplicate / limit warning */
        .duplicate-warn {
            background: #fff4d9;
            color: #6a4f00;
            padding: 0.75rem 0.95rem;
            border-radius: 8px;
            border-left: 3px solid #d4a418;
            font-size: 0.85rem;
            line-height: 1.35;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* ---- Review screen ---- */
        .review {
            display: none;
        }

        .review.visible { display: block; }

        .review-back {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 1rem;
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0;
        }

        .review-back:hover { color: var(--accent); }

        .review-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .review-header h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.35rem;
            font-weight: 400;
            margin-bottom: 0.25rem;
        }

        .review-header p {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .review-card {
            background: #fff;
            border: 1.5px solid var(--warm);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .review-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--warm);
        }

        .review-card-filename {
            font-size: 0.8rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .review-card-warn {
            color: #b8860b;
            font-size: 1rem;
            cursor: help;
            flex-shrink: 0;
            margin-left: 0.5rem;
        }

        .review-card-remove {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            margin-left: 0.5rem;
            flex-shrink: 0;
            line-height: 1;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }

        .review-card-remove:hover {
            color: #c0392b;
            background: #fdecea;
        }

        .review-fields label {
            font-size: 0.7rem;
            margin-bottom: 0.3rem;
        }

        .review-fields input,
        .review-fields select {
            width: 100%;
            padding: 0.7rem 0.75rem;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: var(--ink);
            background: #fff;
            border: 1.5px solid var(--warm);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .review-fields input:focus,
        .review-fields select:focus {
            border-color: var(--accent);
        }

        .review-field {
            margin-bottom: 0.6rem;
        }

        .review-row {
            display: flex;
            gap: 0.6rem;
        }

        .review-row .review-field { flex: 1; }

        .review-actions {
            margin-top: 0.5rem;
            padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
        }

        .review-scan-error {
            padding: 0.5rem 0.75rem;
            background: #fce8e8;
            color: #8b2020;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="brand">
                <svg class="brand-mark" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M3 2 L21 2 L21 25 L19 27 L17 25 L15 27 L13 25 L11 27 L9 25 L7 27 L5 25 L3 27 Z" fill="var(--ink)"/>
                    <rect x="6" y="7" width="12" height="1.6" fill="var(--paper)"/>
                    <rect x="6" y="11" width="9" height="1.6" fill="var(--paper)"/>
                    <rect x="6" y="15" width="12" height="1.6" fill="var(--paper)"/>
                    <rect x="6" y="19.5" width="12" height="2.4" fill="var(--accent)"/>
                </svg>
                <span class="brand-name">Kvitly</span>
            </div>
            <p>Indsend kvittering til <strong>{{ forening_name }}</strong></p>
        </div>

        <form id="receipt-form" enctype="multipart/form-data">
            <div class="field">
                <label for="name">Navn</label>
                <input type="text" id="name" name="name" placeholder="Dit fulde navn" required>
            </div>

            <div class="field">
                <label for="submitter_email">Email{% if not member_email_required %} <span style="color:#8a817a; font-weight:400;">(valgfri)</span>{% endif %}</label>
                <input type="email" id="submitter_email" name="submitter_email"
                       placeholder="din@email.dk"
                       autocomplete="email"
                       inputmode="email"
                       spellcheck="false"
                       autocapitalize="off"
                       maxlength="200"
                       pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
                       title="Indtast en gyldig email, fx navn@domain.dk"
                       {% if member_email_required %}required{% endif %}>
                <small class="email-hint" style="display:block; margin-top:0.4rem; color:#8a817a; font-size:0.82rem;">Så får du bekræftelse og status-opdateringer.</small>
            </div>

            <div class="field">
                <label for="udvalg">Udvalg</label>
                <select id="udvalg" name="udvalg" required>
                    <option value="" disabled selected>Vælg udvalg</option>
                </select>
                <input type="text" id="udvalg-andet" placeholder="Angiv udvalg" style="display:none; margin-top:0.5rem;">
            </div>

            <div class="field">
                <label>Type</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="payment_type" value="udlæg" required>
                        <span>Eget udlæg</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="payment_type" value="foreningskort" required>
                        <span>Foreningens kort</span>
                    </label>
                </div>
            </div>

            <div class="refund-fields" id="refund-fields">
                <div class="field">

                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>

        <div class="submit-bar" id="submit-bar">

            <div class="success-check">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>

        <p style="text-align:center; margin-top:2rem; font-size:0.78rem; color:#8a817a; line-height:1.6;">
            Brug for hjælp? <a href="mailto:othman@ajjalytics.dev" style="color:#9a6f28;">othman@ajjalytics.dev</a><br>
            <a href="/privatlivspolitik" style="color:#9a6f28;">Privatlivspolitik</a>
        </p>

        <div class="review" id="review">
            <button type="button" class="review-back" id="review-back">&larr; Tilbage</button>
            <div class="review-header">
                <h2>Bekræft oplysninger</h2>
                <p>Gennemgå og ret eventuelle fejl</p>
            </div>
            <div id="review-cards"></div>
            <div class="review-actions">
                <button type="button" class="submit-btn" id="confirm-btn">Godkend og send</button>
                <div class="progress-text" id="confirm-progress"></div>

    <script>
        const form = document.getElementById('receipt-form');
        const fileInput = document.getElementById('receipt');
        const cameraInput = document.getElementById('receipt-camera');
        const uploadArea = document.getElementById('upload-area');
        const fileListEl = document.getElementById('file-list');
        const addMoreBtn = document.getElementById('add-more-btn');
        const cameraBtn = document.getElementById('camera-btn');
        const galleryBtn = document.getElementById('gallery-btn');
        const submitBtn = document.getElementById('submit-btn');
        const submitBar = document.getElementById('submit-bar');
        const errorMsg = document.getElementById('error-msg');
        const successDiv = document.getElementById('success');
        const successText = document.getElementById('success-text');
        const ocrResults = document.getElementById('ocr-results');
        const submitBtnLabel = submitBtn.querySelector('.submit-btn__label');

        // Hybrid time-based + real-completion progress: the submit-btn itself
        // is the bar. ::before fills based on --scan-pct CSS variable; the
        // label inside .submit-btn__label flips text as receipts complete.
        const scanProg = {
            pctFake: 0, pctReal: 0, total: 0, completed: 0, done: false, rafId: null,
            start(n) {
                this.total = n; this.completed = 0;
                this.pctFake = 5; this.pctReal = 0; this.done = false;
                // Static label — Render's edge buffers NDJSON unreliably, so
                // per-receipt counter updates can't be trusted to land in
                // real-time. The fill-bar carries the progress signal instead.
                submitBtnLabel.textContent = n > 1
                    ? `Scanner ${n} kvitteringer...`
                    : 'Scanner kvittering...';
                submitBtn.style.setProperty('--scan-pct', '5%');
                cancelAnimationFrame(this.rafId);
                this.rafId = requestAnimationFrame(() => this.tick());
            },
            bump() {
                this.completed++;
                this.pctReal = this.total > 0 ? (this.completed / this.total) * 90 : 0;
            },
            end() { this.done = true; },
            tick() {
                if (this.done) {
                    const cur = parseFloat(submitBtn.style.getPropertyValue('--scan-pct')) || 0;
                    const next = cur + (100 - cur) * 0.22;
                    if (next >= 99.5) {
                        submitBtn.style.setProperty('--scan-pct', '100%');
                        return;
                    }
                    submitBtn.style.setProperty('--scan-pct', next.toFixed(2) + '%');
                } else {
                    // Asymptotic to 90 — quick at start, slows as it approaches
                    this.pctFake += (90 - this.pctFake) * 0.012;
                    const target = Math.max(this.pctFake, this.pctReal);
                    submitBtn.style.setProperty('--scan-pct', target.toFixed(2) + '%');
                }
                this.rafId = requestAnimationFrame(() => this.tick());
            },
        };
        const refundFields = document.getElementById('refund-fields');
        const phoneInput = document.getElementById('phone');
        const regInput = document.getElementById('reg_nr');
        const kontoInput = document.getElementById('konto_nr');
        const reviewDiv = document.getElementById('review');
        const reviewCards = document.getElementById('review-cards');
        const confirmBtn = document.getElementById('confirm-btn');
        const confirmProgress = document.getElementById('confirm-progress');
        const reviewBack = document.getElementById('review-back');

        const CATEGORIES = {{ categories_json | safe }};
        const UDVALG = {{ udvalg_json | safe }};

        // Populate udvalg dropdown — or hide field entirely if forening has no udvalg
        const udvalgSelect = document.getElementById('udvalg');
        const udvalgAndet = document.getElementById('udvalg-andet');
        const udvalgField = udvalgSelect.closest('.field');
        if (UDVALG.length === 0) {
            // No udvalg set up yet → hide field so member can submit
            udvalgSelect.removeAttribute('required');
            udvalgSelect.removeAttribute('name');
            if (udvalgField) udvalgField.style.display = 'none';
        } else {
            UDVALG.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u;
                opt.textContent = u;
                udvalgSelect.appendChild(opt);
            });
            udvalgSelect.addEventListener('change', () => {
                const isAndet = udvalgSelect.value === 'Andet';
                udvalgAndet.style.display = isAndet ? '' : 'none';
                udvalgAndet.required = isAndet;
                if (!isAndet) udvalgAndet.value = '';
            });
        }

        let selectedFiles = [];
        let scanResults = [];
        let formMeta = {};
        let isDirty = false;

        const ALLOWED_TYPES = ['image/', 'application/pdf'];
        const ALLOWED_EXT = ['.heic', '.heif'];

        // --- Restore name from localStorage ---
        const savedName = localStorage.getItem('receipt_name');
        if (savedName) document.getElementById('name').value = savedName;

        // --- Track dirty state ---
        form.addEventListener('input', () => { isDirty = true; });

        // --- Warn before leaving with unsaved data ---
        window.addEventListener('beforeunload', (e) => {
            if (isDirty || selectedFiles.length > 0) {
                e.preventDefault();
            }
        });

        function isAllowedFile(f) {
            if (ALLOWED_TYPES.some(t => f.type.startsWith(t))) return true;
            const ext = f.name.toLowerCase().match(/\.[^.]+$/);
            return ext && ALLOWED_EXT.includes(ext[0]);
        }

        function isImageFile(f) {
            return f.type.startsWith('image/');
        }

        // --- Duplicate detection via SHA-256 hash ---
        const seenHashes = new Set();

        async function hashFile(file) {
            const buf = await file.arrayBuffer();
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- Client-side image compression ---
        function compressImage(file, maxDim = 1600, quality = 0.8) {
            return new Promise((resolve) => {
                if (!file.type.startsWith('image/') || file.type === 'image/gif') {
                    resolve(file);
                    return;
                }
                const img = new window.Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    const { width: w, height: h } = img;
                    if (w <= maxDim && h <= maxDim && file.size <= 1024 * 1024) {
                        resolve(file);
                        return;
                    }
                    const scale = Math.min(maxDim / Math.max(w, h), 1);
                    const canvas = document.createElement('canvas');
                    canvas.width = Math.round(w * scale);
                    canvas.height = Math.round(h * scale);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        const compressed = new File([blob], file.name, { type: 'image/jpeg', lastModified: file.lastModified });
                        resolve(compressed);
                    }, 'image/jpeg', quality);
                };
                img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
                img.src = url;
            });
        }

        // --- Payment type toggle ---
        document.querySelectorAll('input[name="payment_type"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const isUdlaeg = radio.value === 'udlæg' && radio.checked;
                refundFields.classList.toggle('visible', isUdlaeg);
                phoneInput.required = isUdlaeg;
                regInput.required = isUdlaeg;
                kontoInput.required = isUdlaeg;
                if (!isUdlaeg) {
                    phoneInput.value = '';
                    regInput.value = '';
                    kontoInput.value = '';
                }
            });
        });

        // --- Multi-file handling ---
        fileInput.addEventListener('change', () => {
            addFiles(Array.from(fileInput.files));
            fileInput.value = '';
        });

        cameraInput.addEventListener('change', () => {
            addFiles(Array.from(cameraInput.files));
            cameraInput.value = '';
        });

        cameraBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            cameraInput.click();
        });

        galleryBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });

        addMoreBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });

        // Mirrors MAX_BATCH in app.py upload_scan. Client-side cap gives
        // immediate feedback at add-time so the user doesn't compress &
        // upload 50 MB just to get a 400 back from the server.
        const MAX_FILES = 15;

        async function addFiles(newFiles) {
            // Pre-filter: drop invalid types + name/size duplicates against the
            // already-selected list. Hash-dedup runs after the cap check so we
            // don't waste hashes on a batch we're about to reject wholesale.
            const candidates = [];
            for (const f of newFiles) {
                if (!isAllowedFile(f)) continue;
                if (selectedFiles.some(s => s.name === f.name && s.size === f.size)) continue;
                candidates.push(f);
            }

            const remainingSlots = MAX_FILES - selectedFiles.length;
            if (candidates.length > remainingSlots) {
                // Reject the entire batch — partial acceptance silently drops files
                // the user can't identify after the fact. Forcing them to pick fewer
                // is the only honest behavior at the cap.
                showLimitWarning(candidates.length, remainingSlots);
                return;
            }

            let duplicateFound = false;
            for (const f of candidates) {
                const hash = await hashFile(f);
                if (seenHashes.has(hash)) {
                    duplicateFound = true;
                    continue;
                }
                seenHashes.add(hash);
                selectedFiles.push(f);
            }
            renderFileList();
            if (duplicateFound) {
                showDuplicateWarning();
            }
        }

        function showLimitWarning(attempted, remaining) {
            let warn = uploadArea.querySelector('.duplicate-warn.limit-warn');
            if (!warn) {
                warn = document.createElement('div');
                warn.className = 'duplicate-warn limit-warn';
                uploadArea.appendChild(warn);
            }
            if (remaining <= 0) {
                warn.textContent = `Du har allerede ${MAX_FILES} kvitteringer — det er max. Fjern nogle for at tilføje andre.`;
            } else {
                warn.textContent = `Du valgte ${attempted} filer, men der er kun plads til ${remaining} mere (maks ${MAX_FILES} i alt). Ingen blev tilføjet — vælg færre og prøv igen.`;
            }
            clearTimeout(warn._timer);
            warn._timer = setTimeout(() => warn.remove(), 7000);
        }

        function showDuplicateWarning() {
            let warn = uploadArea.querySelector('.duplicate-warn');
            if (!warn) {
                warn = document.createElement('div');
                warn.className = 'duplicate-warn';
                warn.textContent = 'En eller flere filer er allerede tilføjet og blev sprunget over.';
                uploadArea.appendChild(warn);
            }
            clearTimeout(warn._timer);
            warn._timer = setTimeout(() => warn.remove(), 4000);
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        }

        function renderFileList() {
            if (selectedFiles.length === 0) {
                uploadArea.classList.remove('has-files');
                fileListEl.classList.remove('visible');
                fileListEl.innerHTML = '';
                return;
            }

            uploadArea.classList.add('has-files');
            fileListEl.classList.add('visible');
            fileListEl.innerHTML = '';

            selectedFiles.forEach((file, i) => {
                const item = document.createElement('div');
                item.className = 'file-item';

                if (isImageFile(file)) {
                    const thumb = document.createElement('img');
                    thumb.className = 'file-thumb';
                    thumb.alt = '';
                    const reader = new FileReader();
                    reader.onload = (e) => { thumb.src = e.target.result; };
                    reader.readAsDataURL(file);
                    item.appendChild(thumb);
                } else {
                    const icon = document.createElement('div');
                    icon.className = 'file-icon';
                    const ext = file.name.split('.').pop().toUpperCase();
                    icon.textContent = ext;
                    item.appendChild(icon);
                }

                const info = document.createElement('div');
                info.className = 'file-info';
                info.innerHTML = `<div class="file-name">${file.name}</div><div class="file-size">${(file.size / 1024).toFixed(0)} KB</div>`;

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'file-remove';
                removeBtn.innerHTML = '&times;';
                removeBtn.setAttribute('aria-label', 'Fjern');
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFile(i);
                });

                item.appendChild(info);
                item.appendChild(removeBtn);
                fileListEl.appendChild(item);
            });
        }

        // --- Drag & drop ---
        ['dragenter', 'dragover'].forEach(evt => {
            uploadArea.addEventListener(evt, (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
        });

        ['dragleave', 'drop'].forEach(evt => {
            uploadArea.addEventListener(evt, (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
            });
        });

        uploadArea.addEventListener('drop', (e) => {
            const files = Array.from(e.dataTransfer.files).filter(isAllowedFile);
            if (files.length) addFiles(files);
        });

        // --- Render OCR results on success screen ---
        function renderOcrResults(receipts) {
            ocrResults.innerHTML = '';
            if (!receipts.length) return;

            const labels = { vendor: 'Butik', description: 'Beskrivelse', amount: 'Beløb', date: 'Dato', category: 'Kategori' };
            for (const r of receipts) {
                for (const [key, label] of Object.entries(labels)) {
                    let val = r[key];
                    if (val == null || val === '') continue;
                    if (key === 'amount') val = `${val} ${r.currency || 'DKK'}`;
                    const row = document.createElement('div');
                    row.className = 'ocr-item';
                    row.innerHTML = `<span class="ocr-label">${label}</span><span class="ocr-value">${val}</span>`;
                    ocrResults.appendChild(row);
                }
                if (receipts.length > 1) {
                    const sep = document.createElement('hr');
                    sep.style.cssText = 'border:none;border-top:1px solid rgba(45,90,45,0.1);margin:0.25rem 0';
                    ocrResults.appendChild(sep);
                }
            }
        }

        // --- NDJSON stream reader helper ---
        async function readNDJSON(response, onLine) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (!line.trim()) continue;
                    try { onLine(JSON.parse(line)); }
                    catch (_) { onLine({ _parseError: true }); }
                }
            }
        }

        // --- HTML-safe attribute escaping ---
        function esc(s) {
            return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        }

        // --- Phase 1: Submit form → scan OCR ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('visible');

            if (selectedFiles.length === 0) {
                errorMsg.textContent = 'Vedhæft venligst mindst én kvittering.';
                errorMsg.classList.add('visible');
                return;
            }

            // Save form metadata for the confirm step
            formMeta = {
                name: document.getElementById('name').value.trim(),
                submitter_email: document.getElementById('submitter_email').value.trim(),
                comment: document.getElementById('comment').value.trim(),
                payment_type: document.querySelector('input[name="payment_type"]:checked')?.value || '',
                phone: phoneInput.value.trim(),
                reg_nr: regInput.value.trim(),
                konto_nr: kontoInput.value.trim(),
                udvalg: udvalgSelect.value === 'Andet' && udvalgAndet.value.trim()
                    ? 'Andet: ' + udvalgAndet.value.trim()
                    : udvalgSelect.value,
            };

            // Remember name for next visit
            localStorage.setItem('receipt_name', formMeta.name);

            submitBtn.classList.add('loading', 'scanning');
            submitBtn.disabled = true;

            const total = selectedFiles.length;
            submitBtnLabel.textContent = total > 1
                ? `Komprimerer ${total} kvitteringer...`
                : 'Komprimerer kvittering...';

            // Compress all files and build FormData
            const formData = new FormData();
            formData.append('name', formMeta.name);
            for (let i = 0; i < total; i++) {
                formData.append('receipt', await compressImage(selectedFiles[i]));
            }

            scanProg.start(total);

            scanResults = [];
            let scanErrors = [];

            try {
                const res = await fetch(`/u/{{ upload_token }}/scan`, { method: 'POST', body: formData });
                if (!res.ok) {
                    try {
                        const data = await res.json();
                        scanErrors.push(data.error || 'Ukendt fejl');
                    } catch { scanErrors.push('Ukendt serverfejl'); }
                } else {
                    await readNDJSON(res, (r) => {
                        if (r._parseError) {
                            scanErrors.push('Kunne ikke læse svar fra server');
                        } else if (r.step === 'starting') {
                            // Server confirms batch — already started locally
                        } else if (r.status === 'ok') {
                            scanProg.bump();
                            scanResults.push({
                                temp_id: r.temp_id,
                                receipt: r.receipt,
                                filename: r.filename,
                            });
                        } else if (r.status === 'error') {
                            scanProg.bump();
                            const fname = r.filename || `Kvittering ${(r.index || 0) + 1}`;
                            scanErrors.push(`${fname}: ${r.error || 'Ukendt fejl'}`);
                        }
                    });
                }
            } catch (err) {
                scanErrors.push('Kunne ikke forbinde til serveren');
            }

            scanProg.end();
            submitBtn.classList.remove('loading', 'scanning');
            submitBtn.disabled = false;
            submitBtn.style.removeProperty('--scan-pct');
            submitBtnLabel.textContent = 'Send kvittering';

            if (scanResults.length > 0) {
                showReview(scanErrors);
            } else {
                errorMsg.textContent = scanErrors[0] || 'Noget gik galt. Prøv igen.';
                errorMsg.classList.add('visible');
            }
        });

        // --- Phase 2: Show review screen ---
        function showReview(scanErrors) {
            form.style.display = 'none';
            submitBar.style.display = 'none';

            reviewCards.innerHTML = '';

            // Show scan errors (files that failed OCR)
            if (scanErrors.length > 0) {
                for (const err of scanErrors) {
                    const errEl = document.createElement('div');
                    errEl.className = 'review-scan-error';
                    errEl.textContent = err;
                    reviewCards.appendChild(errEl);
                }
            }

            // Build a review card for each successful scan
            for (let i = 0; i < scanResults.length; i++) {
                const { receipt, filename } = scanResults[i];
                const card = document.createElement('div');
                card.className = 'review-card';
                card.dataset.index = i;

                // Header
                const header = document.createElement('div');
                header.className = 'review-card-header';
                const fnameEl = document.createElement('span');
                fnameEl.className = 'review-card-filename';
                fnameEl.textContent = filename;
                header.appendChild(fnameEl);

                if (receipt.confidence_note) {
                    const warn = document.createElement('span');
                    warn.className = 'review-card-warn';
                    warn.textContent = '\u26A0';
                    warn.title = receipt.confidence_note;
                    header.appendChild(warn);
                }

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'review-card-remove';
                removeBtn.title = 'Fjern kvittering';
                removeBtn.textContent = '\u2715';
                removeBtn.addEventListener('click', () => {
                    const idx = parseInt(card.dataset.index, 10);
                    scanResults.splice(idx, 1);
                    card.remove();
                    // Re-index remaining cards
                    reviewCards.querySelectorAll('.review-card').forEach((c, j) => {
                        c.dataset.index = j;
                    });
                    // If none left, go back to form
                    if (scanResults.length === 0) {
                        reviewDiv.classList.remove('visible');
                        form.style.display = '';
                        submitBar.style.display = '';
                    }
                });
                header.appendChild(removeBtn);

                card.appendChild(header);

                // Editable fields
                const fields = document.createElement('div');
                fields.className = 'review-fields';
                fields.innerHTML = `
                    <div class="review-row">
                        <div class="review-field" style="flex:1">
                            <label>Butik</label>
                            <input type="text" data-key="vendor" value="${esc(receipt.vendor)}">
                        </div>
                        <div class="review-field" style="flex:0 0 35%">
                            <label>Beløb</label>
                            <input type="number" data-key="amount" value="${esc(receipt.amount)}" step="0.01" inputmode="decimal">
                        </div>
                    </div>
                    <div class="review-row">
                        <div class="review-field">
                            <label>Dato</label>
                            <input type="date" data-key="date" value="${esc(receipt.date)}">
                        </div>
                        <div class="review-field">
                            <label>Kategori</label>
                            <select data-key="category">
                                ${CATEGORIES.map(c => `<option value="${esc(c)}" ${c === receipt.category ? 'selected' : ''}>${esc(c)}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="review-field">
                        <label>Beskrivelse</label>
                        <input type="text" data-key="description" value="${esc(receipt.description)}">
                    </div>
                `;
                card.appendChild(fields);
                reviewCards.appendChild(card);
            }

            reviewDiv.classList.add('visible');
        }

        // --- Back from review to form ---
        reviewBack.addEventListener('click', () => {
            reviewDiv.classList.remove('visible');
            form.style.display = '';
            submitBar.style.display = '';
        });

        // --- Phase 3: Confirm → send to Google Sheets ---
        confirmBtn.addEventListener('click', async () => {
            confirmBtn.classList.add('loading');
            confirmBtn.disabled = true;

            // Remove any previous confirm error
            const prevErr = reviewDiv.querySelector('.confirm-error');
            if (prevErr) prevErr.remove();

            const total = scanResults.length;
            confirmProgress.textContent = total > 1
                ? `Sender kvittering 1 af ${total}...`
                : 'Sender til Google Sheets...';
            confirmProgress.classList.add('visible');

            // Collect edited data from review cards
            const receipts = scanResults.map((sr, i) => {
                const card = reviewCards.querySelector(`.review-card[data-index="${i}"]`);
                const edited = { ...sr.receipt };
                if (card) {
                    card.querySelectorAll('[data-key]').forEach(el => {
                        const key = el.dataset.key;
                        let val = el.tagName === 'SELECT' ? el.value : el.value;
                        if (key === 'amount') val = val ? parseFloat(val) : null;
                        edited[key] = val;
                    });
                }
                return { temp_id: sr.temp_id, receipt: edited };
            });

            // Keep a copy for the success screen
            const editedReceipts = receipts.map(r => r.receipt);

            const payload = { ...formMeta, receipts };

            let completed = 0;
            let errors = [];

            try {
                const res = await fetch(`/u/{{ upload_token }}/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!res.ok) {
                    try {
                        const data = await res.json();
                        errors.push(data.error || 'Ukendt fejl');
                    } catch { errors.push('Ukendt serverfejl'); }
                } else {
                    await readNDJSON(res, (r) => {
                        if (r._parseError) {
                            errors.push('Kunne ikke læse svar fra server');
                        } else if (r.step) {
                            confirmProgress.textContent = r.message;
                        } else if (r.status === 'ok') {
                            completed++;
                            if (total > 1 && r.index + 1 < total) {
                                confirmProgress.textContent = `Sender kvittering ${r.index + 2} af ${total}...`;
                            }
                        } else {
                            errors.push(r.error || 'Ukendt fejl');
                        }
                    });
                }
            } catch (err) {
                errors.push('Kunne ikke forbinde til serveren');
            }

            confirmBtn.classList.remove('loading');
            confirmBtn.disabled = false;
            confirmProgress.classList.remove('visible');

            if (completed > 0) {
                isDirty = false;
                form.reset();
                refundFields.classList.remove('visible');
                reviewDiv.classList.remove('visible');

                if (completed === total && errors.length === 0) {
                    successText.textContent = total === 1
                        ? 'Din kvittering er modtaget og bogført.'
                        : `Alle ${completed} kvitteringer er modtaget!`;
                } else {
                    successText.textContent = `${completed} af ${total} kvitteringer sendt. ${errors.length} fejlede.`;
                }

                renderOcrResults(editedReceipts.slice(0, completed));
                successDiv.classList.add('visible');
                selectedFiles = [];
                scanResults = [];
            } else {
                const errEl = document.createElement('div');
                errEl.className = 'confirm-error error-msg visible';
                errEl.textContent = errors[0] || 'Noget gik galt. Prøv igen.';
                confirmBtn.parentNode.insertBefore(errEl, confirmBtn);
            }
        });
    </script>
</body>
</html>
