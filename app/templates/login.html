<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M7 3 L25 3 L25 25 L23 27 L21 25 L19 27 L17 25 L15 27 L13 25 L11 27 L9 25 L7 27 Z' fill='%231a1612'/><rect x='10' y='8' width='12' height='1.8' fill='%23fafaf7'/><rect x='10' y='12' width='8' height='1.8' fill='%23fafaf7'/><rect x='10' y='16' width='12' height='1.8' fill='%23fafaf7'/><rect x='10' y='20' width='12' height='2.6' fill='%239a6f28'/></svg>">
    <title>Kvitly · Log ind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1612; --paper: #fafaf7; --warm: #e8e4d8; --warm-dark: #d6d0c0;
            --accent: #9a6f28; --accent-hover: #7d5a20; --muted: #8a817a; --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--paper); color: var(--ink);
            min-height: 100dvh; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .auth-card { width: 100%; max-width: 360px; padding: 2.75rem 2rem; text-align: center; }
        .brand { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .brand-mark { width: 22px; height: 28px; }
        .brand-name { font-family: 'Fraunces', serif; font-size: 1.7rem; font-weight: 400; letter-spacing: -0.02em; }
        h1 { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 0.4rem; }
        .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
        label { display: block; text-align: left; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 0.8rem 1rem; font-family: inherit; font-size: 16px;
            color: var(--ink); background: #fff; border: 1px solid var(--warm-dark);
            border-radius: var(--radius); outline: none; transition: border-color 0.2s;
            margin-bottom: 1rem;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%; padding: 0.95rem; font-family: inherit; font-size: 1rem; font-weight: 500;
            color: var(--paper); background: var(--ink); border: none; border-radius: var(--radius);
            cursor: pointer; transition: background 0.2s; margin-top: 0.4rem;
        }
        button:hover { background: var(--accent); }
        .error {
            display: flex;
            align-items: flex-start;
            gap: 0.55rem;
            background: #fef0ef;
            border-left: 3px solid #c84a3a;
            color: #8a2a20;
            padding: 0.7rem 0.9rem;
            border-radius: var(--radius);
            font-size: 0.88rem;
            line-height: 1.4;
            margin-bottom: 1rem;
            text-align: left;
        }
        .error::before {
            content: "";
            flex-shrink: 0;
            width: 18px; height: 18px;
            margin-top: 1px;
            background: no-repeat center/contain url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c84a3a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><line x1='12' y1='8' x2='12' y2='12'/><circle cx='12' cy='16' r='0.5' fill='%23c84a3a' stroke-width='2'/></svg>");
        }
        .footer-link { display: block; margin-top: 1.6rem; font-size: 0.85rem; color: var(--muted); }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <svg class="brand-mark" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 2 L21 2 L21 25 L19 27 L17 25 L15 27 L13 25 L11 27 L9 25 L7 27 L5 25 L3 27 Z" fill="var(--ink)"/>
                <rect x="6" y="7" width="12" height="1.6" fill="var(--paper)"/>
                <rect x="6" y="11" width="9" height="1.6" fill="var(--paper)"/>
                <rect x="6" y="15" width="12" height="1.6" fill="var(--paper)"/>
                <rect x="6" y="19.5" width="12" height="2.4" fill="var(--accent)"/>
            </svg>
            <span class="brand-name">Kvitly</span>
        </div>
        <h1>Log ind</h1>
        <p class="subtitle">Adgang for foreningens administrator</p>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST" action="{{ url_for('login_post') }}">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ email|default('') }}" autocomplete="email" required autofocus>
            <label for="password">Adgangskode</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit">Log ind</button>
        </form>
        <p class="footer-link"><a href="{{ url_for('forgot_password') }}">Glemt adgangskode?</a></p>
        <p class="footer-link">Har du ikke en konto? <a href="{{ url_for('signup') }}">Opret forening</a></p>
    </div>
    <script>
        // Danish HTML5 validation messages — browsers default to user's locale,
        // but we always want Danish on Kvitly. Setting custom messages on the
        // invalid event lets the browser still pick when to show them.
        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('invalid', () => {
                const v = el.validity;
                let msg = '';
                if (v.valueMissing) msg = 'Udfyld venligst dette felt.';
                else if (v.typeMismatch && el.type === 'email') msg = 'Indtast en gyldig email-adresse.';
                else if (v.tooShort) msg = `Minimum ${el.minLength} tegn.`;
                else if (v.patternMismatch) msg = 'Ugyldigt format.';
                el.setCustomValidity(msg);
            });
            el.addEventListener('input', () => el.setCustomValidity(''));
        });
    </script>
</body>
</html>
