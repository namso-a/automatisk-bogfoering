<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvitly · Link ikke gyldigt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1612; --paper: #fafaf7; --accent: #9a6f28; --muted: #8a817a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--paper); color: var(--ink);
            min-height: 100dvh; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .card { max-width: 420px; text-align: center; }
        h1 { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 0.6rem; }
        p { color: var(--muted); font-size: 0.95rem; line-height: 1.55; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Linket er ikke gyldigt</h1>
        <p>Kvitterings-linket virker ikke længere. Det kan være udløbet eller sat på pause af foreningen.</p>
        <p>Kontakt din forenings administrator for at få et nyt link.</p>
    </div>
</body>
</html>
