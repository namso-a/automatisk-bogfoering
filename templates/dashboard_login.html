<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a18;
            --paper: #f6f3ed;
            --warm: #e8e3d9;
            --accent: #c45d3e;
            --accent-hover: #a94e33;
            --muted: #8a8578;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 360px;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            color: var(--ink);
            background: #fff;
            border: 1.5px solid var(--warm);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 0.85rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: var(--accent-hover); }
        .error {
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Dashboard</h1>
        <p class="subtitle">Log ind for at se oversigten</p>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Adgangskode" required autofocus>
            <button type="submit">Log ind</button>
        </form>
    </div>
</body>
</html>
