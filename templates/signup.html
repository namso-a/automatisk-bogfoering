<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M7 3 L25 3 L25 25 L23 27 L21 25 L19 27 L17 25 L15 27 L13 25 L11 27 L9 25 L7 27 Z' fill='%231a1612'/><rect x='10' y='8' width='12' height='1.8' fill='%23fafaf7'/><rect x='10' y='12' width='8' height='1.8' fill='%23fafaf7'/><rect x='10' y='16' width='12' height='1.8' fill='%23fafaf7'/><rect x='10' y='20' width='12' height='2.6' fill='%239a6f28'/></svg>">
    <title>Kvitly · Opret forening</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1612; --paper: #fafaf7; --warm: #e8e4d8; --warm-dark: #d6d0c0;
            --accent: #9a6f28; --accent-hover: #7d5a20; --muted: #8a817a; --radius: 6px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--paper); color: var(--ink);
            min-height: 100dvh; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .auth-card { width: 100%; max-width: 420px; padding: 2.5rem 2rem; }
        .brand { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .brand-mark { width: 22px; height: 28px; }
        .brand-name { font-family: 'Fraunces', serif; font-size: 1.7rem; font-weight: 400; letter-spacing: -0.02em; }
        h1 { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 0.4rem; }
        .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin: 0.85rem 0 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
        label:first-of-type { margin-top: 0; }
        input { width: 100%; padding: 0.78rem 1rem; font-family: inherit; font-size: 16px; color: var(--ink); background: #fff; border: 1px solid var(--warm-dark); border-radius: var(--radius); outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 0.95rem; font-family: inherit; font-size: 1rem; font-weight: 500; color: var(--paper); background: var(--ink); border: none; border-radius: var(--radius); cursor: pointer; transition: background 0.2s; margin-top: 1.5rem; }
        button:hover { background: var(--accent); }
        .error { color: #b33; font-size: 0.88rem; margin-bottom: 0.5rem; }
        .hint { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.45; }
        .footer-link { display: block; margin-top: 1.4rem; font-size: 0.85rem; color: var(--muted); text-align: center; }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand">
            <svg class="brand-mark" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 2 L21 2 L21 25 L19 27 L17 25 L15 27 L13 25 L11 27 L9 25 L7 27 L5 25 L3 27 Z" fill="var(--ink)"/>
                <rect x="6" y="7" width="12" height="1.6" fill="var(--paper)"/>
                <rect x="6" y="11" width="9" height="1.6" fill="var(--paper)"/>
                <rect x="6" y="15" width="12" height="1.6" fill="var(--paper)"/>
                <rect x="6" y="19.5" width="12" height="2.4" fill="var(--accent)"/>
            </svg>
            <span class="brand-name">Kvitly</span>
        </div>
        <h1>Opret forening</h1>
        <p class="subtitle">Lukket beta — kræver invite-kode.</p>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST" action="{{ url_for('signup_post') }}">
            <label for="invite_code">Invite-kode</label>
            <input type="text" id="invite_code" name="invite_code" value="{{ invite_code|default('') }}" required autocomplete="off">
            <p class="hint">Modtaget via email eller direkte link.</p>

            <label for="forening_navn">Foreningens navn</label>
            <input type="text" id="forening_navn" name="forening_navn" value="{{ prefill.forening_navn|default('') }}" required maxlength="120" autocomplete="organization">

            <label for="email">Din email (admin)</label>
            <input type="email" id="email" name="email" value="{{ prefill.email|default('') }}" required autocomplete="email">

            <label for="password">Vælg adgangskode</label>
            <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
            <p class="hint">Minimum 8 tegn.</p>

            <button type="submit">Opret konto</button>
        </form>
        <p class="footer-link">Har du allerede en konto? <a href="{{ url_for('login') }}">Log ind</a></p>
    </div>
</body>
</html>
